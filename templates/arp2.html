<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lancer ARP Spoofing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
<div class="container">
    <h1 class="mb-4">Formulaire – ARP Spoofing</h1>
    <form action="/launch_arp" method="post">
        <div class="mb-3">
            <label>IP Victime </label>
            <input type="text" name="victim_ip" class="form-control" value="" required>
        </div>
        <div class="mb-3">
            <label>IP Passerelle</label>
            <input type="text" name="gateway_ip" class="form-control" value="" required>
        </div>
        <div class="mb-3">
            <label>Interface (Kali)</label>
            <input type="text" name="interface" class="form-control" value="" required>
        </div>
        <button type="submit" class="btn btn-danger">Lancer l'attaque</button>
    </form>
    <a href="/" class="btn btn-secondary mt-3">← Retour à l'accueil</a>
</div>
</body>
</html>
